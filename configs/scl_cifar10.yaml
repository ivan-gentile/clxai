# Supervised Contrastive Learning - CIFAR10 + ResNet-18
# Two-stage: encoder pretraining (500 epochs) + linear probe (100 epochs)
# Reference: Khosla et al. "Supervised Contrastive Learning" (NeurIPS 2020)

model:
  architecture: resnet18_encoder
  embedding_dim: 128

training:
  epochs: 500
  batch_size: 256
  optimizer: sgd
  lr: 0.5
  momentum: 0.9
  weight_decay: 0.0001
  warmup_epochs: 10
  scheduler: cosine

  loss: supcon
  supcon:
    temperature: 0.07
    base_temperature: 0.07

data:
  dataset: cifar10
  data_dir: ./data
  num_workers: 4
  contrastive: true

evaluation:
  linear_probe:
    epochs: 100
    lr: 0.1
    num_classes: 10

output:
  output_dir: results/cifar10/scl
  save_freq: 100
