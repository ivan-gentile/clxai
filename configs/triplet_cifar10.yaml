# Triplet Loss - CIFAR10 + ResNet-18
# Two-stage: encoder pretraining (500 epochs) + linear probe (100 epochs)
# In-batch semi-hard negative mining
# Reference: Schroff et al. "FaceNet" (CVPR 2015)

model:
  architecture: resnet18_encoder
  embedding_dim: 128

training:
  epochs: 500
  batch_size: 256
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0001
  warmup_epochs: 10
  scheduler: cosine

  loss: triplet
  triplet:
    margin: 0.3
    mining: semi-hard

data:
  dataset: cifar10
  data_dir: ./data
  num_workers: 4
  contrastive: false

evaluation:
  linear_probe:
    epochs: 100
    lr: 0.1
    num_classes: 10

output:
  output_dir: results/cifar10/triplet
  save_freq: 100
